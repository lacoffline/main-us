<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - charlieputh@usmail.com - USMail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans&family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f8fc;
            margin: 0;
            overflow: hidden; /* Prevent body scrolling */
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #444746;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }

        .sidebar-item {
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
            margin-right: 16px;
        }
        
        .sidebar-item.active {
            background-color: #d3e3fd;
            color: #0b57d0;
            font-weight: 500;
        }
        
        .sidebar-item.active .material-symbols-outlined {
            color: #0b57d0;
            font-variation-settings: 'FILL' 1;
        }

        .email-row:hover {
            box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
            z-index: 1;
        }

        .email-row {
            border-bottom: 1px solid #f2f6fc;
            background-color: #f2f6fc;
            cursor: pointer;
        }

        .email-row.read {
            background-color: #ffffff;
        }

        .email-row.read .email-subject {
            font-weight: 400;
        }
        
        .email-row.read .email-sender {
            font-weight: 400;
        }

        .email-sender, .email-subject {
            font-weight: 700;
        }

        .compose-btn {
            background-color: #c2e7ff;
            color: #001d35;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .compose-btn:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            font-weight: 500;
        }

        #profile-dropdown, #compose-window {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dadce0;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bdc1c6;
        }

        .tab-btn {
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            border-bottom: 3px solid #0b57d0;
            color: #0b57d0;
        }
        .tab-btn.active .material-symbols-outlined {
            color: #0b57d0;
        }
    </style>
</head>

    <script>
        // Database of Fake Emails
        const emails = [
            // Inbox - Normal
            { id: 1, sender: "Apple", subject: "Your receipt from Apple", snippet: "Thank you for your purchase. Here is your receipt...", folder: "inbox", date: "10:30 AM", read: false, starred: false, avatarColor: "#9c27b0" },

            // Social

            { id: 7, sender: "LinkedIn", subject: "David Beckham viewed your profile", snippet: "See who else is looking at your professional profile.", folder: "social", date: "Yesterday", read: true, starred: false, avatarColor: "#007bb5" },
            { id: 8, sender: "Instagram", subject: "Selena Gomez liked your photo", snippet: "Someone you follow interacted with your post.", folder: "social", date: "Oct 11", read: false, starred: false, avatarColor: "#e91e63" },
            
            // Promotions
            { id: 9, sender: "Spotify", subject: "New release from The Weeknd", snippet: "Listen to the brand new track right now on Spotify Premium.", folder: "promotions", date: "8:20 AM", read: false, starred: false, avatarColor: "#1db954" },
            { id: 10, sender: "Nike", subject: "50% OFF Flash Sale!", snippet: "Shop our latest sneakers and apparel at half price for 24 hours.", folder: "promotions", date: "Yesterday", read: true, starred: false, avatarColor: "#ff5722" },
            { id: 11, sender: "Amazon", subject: "Recommended for you: Keyboards", snippet: "Based on your recent browsing history, we think you'll love these.", folder: "promotions", date: "Oct 05", read: true, starred: false, avatarColor: "#ff9800" },

            // Spam (Foreigners / Scams)
            { id: 12, sender: "Prince Abdullah", subject: "URGENT BUSINESS PROPOSAL", snippet: "Dear Sir, I have a sum of $10,000,000 USD that I need to transfer...", folder: "spam", date: "2:00 AM", read: false, starred: false, avatarColor: "#795548" },
            { id: 13, sender: "Russian Brides", subject: "Elena is waiting for your reply", snippet: "Find the love of your life today. Click here to chat with beautiful women.", folder: "spam", date: "Yesterday", read: false, starred: false, avatarColor: "#e91e63" },
            { id: 14, sender: "Dr. Richard W.", subject: "Cure baldness in 3 DAYS", snippet: "This miracle pill discovered by a foreign doctor changes everything.", folder: "spam", date: "Oct 12", read: false, starred: false, avatarColor: "#607d8b" },
            { id: 15, sender: "IRS Official Dept", subject: "FINAL NOTICE: Arrest Warrant", snippet: "Your tax returns are fraudulent. Pay via iTunes gift cards immediately.", folder: "spam", date: "Oct 11", read: false, starred: false, avatarColor: "#d32f2f" },
            { id: 16, sender: "Lottery Winner", subject: "YOU WON £500,000 GBP", snippet: "Your email address was randomly selected in the European lottery.", folder: "spam", date: "Oct 10", read: false, starred: false, avatarColor: "#fbc02d" },
            { id: 17, sender: "Mr. Jean-Luc", subject: "Investment opportunity in Paris", snippet: "Bonjour, I need a reliable partner for a real estate venture.", folder: "spam", date: "Oct 09", read: false, starred: false, avatarColor: "#3f51b5" },

            { id: 20, sender: "Norton Antivirus", subject: "Your PC is INFECTED (3) Viruses", snippet: "Renew your subscription immediately or lose all your files.", folder: "spam", date: "Oct 06", read: false, starred: false, avatarColor: "#ff5722" },

            // Drafts
            { id: 21, sender: "Draft", subject: "Project Ideas for Q4", snippet: "Here are some things we should consider...", folder: "drafts", date: "Draft", read: true, starred: false, avatarColor: "#9e9e9e" },
            { id: 22, sender: "Draft", subject: "Happy Birthday Mom", snippet: "Hope you have a wonderful day!", folder: "drafts", date: "Draft", read: true, starred: false, avatarColor: "#9e9e9e" },
            
            // Sent
            { id: 23, sender: "To: Shawn Mendes", subject: "Collab idea", snippet: "Hey man, got a sick beat we should work on...", folder: "sent", date: "Oct 01", read: true, starred: false, avatarColor: "#607d8b" },
            
            // Purchases
            { id: 24, sender: "eBay", subject: "Order Confirmed: Vintage Synthesizer", snippet: "Your item is being shipped.", folder: "purchases", date: "Sep 28", read: true, starred: false, avatarColor: "#3f51b5" }
        ];

        let currentFolder = 'inbox';
        let searchQuery = '';

        // DOM Elements
        const emailListContainer = document.getElementById('email-list');
        const searchInput = document.getElementById('search-input');
        const profileBtn = document.getElementById('profile-btn');
        const profileDropdown = document.getElementById('profile-dropdown');
        const logoutBtn = document.getElementById('logout-btn');
        const tabsContainer = document.getElementById('tabs-container');

        // Functions
        function getInitial(name) {
            if(name.startsWith("To: ")) name = name.substring(4);
            return name.charAt(0).toUpperCase();
        }

        function renderEmails() {
            emailListContainer.innerHTML = '';
            
            let filteredEmails = emails.filter(email => {
                let matchesFolder = email.folder === currentFolder;
                if (currentFolder === 'all') matchesFolder = true;
                if (currentFolder === 'starred') matchesFolder = email.starred;
                if (currentFolder === 'snoozed') matchesFolder = false; // Mock empty
                
                let matchesSearch = true;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    matchesSearch = email.subject.toLowerCase().includes(q) || 
                                    email.sender.toLowerCase().includes(q) || 
                                    email.snippet.toLowerCase().includes(q);
                }

                return matchesFolder && matchesSearch;
            });

            if (filteredEmails.length === 0) {
                emailListContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-500 mt-20">
                        <span class="material-symbols-outlined text-[60px] mb-4 text-gray-300">inbox</span>
                        <p class="text-base">Nothing to see here.</p>
                    </div>`;
                return;
            }

            filteredEmails.forEach(email => {
                const isReadClass = email.read ? 'read' : '';
                const starIcon = email.starred ? 'star' : 'star_border';
                const starColorClass = email.starred ? 'text-yellow-400' : 'text-gray-400';
                
                const html = `
                    <div class="email-row ${isReadClass} flex items-center px-4 py-2 group" onclick="toggleRead(${email.id})">
                        <div class="flex items-center space-x-2 w-16">
                            <button class="p-1 rounded-full hover:bg-gray-200 text-gray-400" onclick="event.stopPropagation(); alertMsg('Selected')">
                                <span class="material-symbols-outlined text-[20px]">check_box_outline_blank</span>
                            </button>
                            <button class="p-1 rounded-full hover:bg-gray-200 ${starColorClass}" onclick="event.stopPropagation(); toggleStar(${email.id})">
                                <span class="material-symbols-outlined text-[20px] ${email.starred ? 'filled' : ''}">${starIcon}</span>
                            </button>
                        </div>
                        
                        <div class="w-48 pr-4 flex items-center space-x-2">
                            <div class="avatar" style="background-color: ${email.avatarColor}; font-size: 14px; width: 28px; height: 28px;">
                                ${getInitial(email.sender)}
                            </div>
                            <span class="email-sender truncate text-[14px] text-gray-800">${email.sender}</span>
                        </div>
                        
                        <div class="flex-1 truncate pr-4 text-[14px]">
                            <span class="email-subject text-gray-800">${email.subject}</span>
                            <span class="text-gray-500 ml-1">- ${email.snippet}</span>
                        </div>
                        
                        <div class="w-20 text-right text-[12px] font-medium text-gray-700 group-hover:hidden">
                            ${email.date}
                        </div>
                        
                        <div class="w-20 text-right hidden group-hover:flex justify-end space-x-2">
                            <button class="text-gray-500 hover:text-gray-800" onclick="event.stopPropagation(); alertMsg('Archived')"><span class="material-symbols-outlined text-[20px]">archive</span></button>
                            <button class="text-gray-500 hover:text-gray-800" onclick="event.stopPropagation(); alertMsg('Deleted')"><span class="material-symbols-outlined text-[20px]">delete</span></button>
                            <button class="text-gray-500 hover:text-gray-800" onclick="event.stopPropagation(); alertMsg('Marked unread')"><span class="material-symbols-outlined text-[20px]">mark_email_unread</span></button>
                            <button class="text-gray-500 hover:text-gray-800" onclick="event.stopPropagation(); alertMsg('Snoozed')"><span class="material-symbols-outlined text-[20px]">schedule</span></button>
                        </div>
                    </div>
                `;
                emailListContainer.innerHTML += html;
            });
        }

        window.changeFolder = function(folder, element, tabElement) {
            currentFolder = folder;
            searchQuery = '';
            searchInput.value = '';

            // Manage active states for Sidebar
            if(element) {
                document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            // Manage active states for Tabs
            if(tabElement) {
                document.querySelectorAll('.tab-btn').forEach(el => {
                    el.classList.remove('active');
                    el.classList.add('text-gray-600');
                });
                tabElement.classList.add('active');
                tabElement.classList.remove('text-gray-600');
            }

            // Show/Hide Tabs based on folder
            if (['inbox', 'promotions', 'social'].includes(folder)) {
                tabsContainer.style.display = 'flex';
                // Sync tabs with sidebar click
                if(element && folder === 'inbox') {
                    const primaryTab = document.querySelectorAll('.tab-btn')[0];
                    document.querySelectorAll('.tab-btn').forEach(el => {el.classList.remove('active'); el.classList.add('text-gray-600');});
                    primaryTab.classList.add('active'); primaryTab.classList.remove('text-gray-600');
                }
            } else {
                tabsContainer.style.display = 'none';
            }

            renderEmails();
        }

        window.toggleStar = function(id) {
            const email = emails.find(e => e.id === id);
            if (email) {
                email.starred = !email.starred;
                renderEmails();
            }
        }

        window.toggleRead = function(id) {
            const email = emails.find(e => e.id === id);
            if (email) {
                email.read = true;
                renderEmails();
                // We mock opening the email with an alert instead of full UI implementation to keep code simple
                alertMsg(`Opened email: ${email.subject}`);
            }
        }

        window.toggleCompose = function(e) {
            if(e) e.stopPropagation();
            const composeWin = document.getElementById('compose-window');
            if (composeWin.classList.contains('hidden')) {
                composeWin.classList.remove('hidden');
            } else {
                composeWin.classList.add('hidden');
            }
        }

        window.alertMsg = function(msg) {
            const alertBox = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = msg;
            alertBox.classList.remove('hidden');
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }

        // Search listener
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderEmails();
        });

        // Profile Dropdown Toggle
        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!profileDropdown.contains(e.target) && !profileBtn.contains(e.target)) {
                profileDropdown.classList.add('hidden');
            }
        });

        // Logout Event (Opens requested tab)
        logoutBtn.addEventListener('click', () => {
            window.open('https://static.wikia.nocookie.net/cheap-cartoon-show/images/8/82/Zombie1.jpg/revision/latest?cb=20191021235726', '_blank');
            profileDropdown.classList.add('hidden');
            alertMsg("Logging out...");
        });

        // Initial Render
        window.onload = () => {
            renderEmails();
        };

    </script>
</body>
</html>
